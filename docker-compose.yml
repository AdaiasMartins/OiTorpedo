version: "3.8"

services:
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - evolution-network

  postgres:
    image: postgres:16-alpine
    container_name: evolution-postgres
    restart: always
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - evolution-network

  redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - evolution-network

  poc-api:
    build:
      context: ./evolution-poc
    container_name: evolution-poc-api
    restart: always
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      EVOLUTION_BASE_URL: http://evolution-api:8080
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SEND_DELAY_SECONDS: 3
    volumes:
      - .:/workspace
    ports:
      - "8000:8000"
    depends_on:
      evolution-api:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - evolution-network

  worker-celery:
    build:
      context: ./evolution-poc
    container_name: evolution-celery-worker
    restart: always
    env_file:
      - .env
    environment:
      EVOLUTION_BASE_URL: http://evolution-api:8080
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SEND_DELAY_SECONDS: 3
    volumes:
      - .:/workspace
    depends_on:
      evolution-api:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - evolution-network

volumes:
  evolution_instances:
  postgres_data:
  redis_data:

networks:
  evolution-network:
    driver: bridge
